<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Landing Page Retro</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #716d6da0, #1a1a1a);
      color: #00aaff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      z-index: 1;
    }

    p {
      margin-bottom: 20px;
      font-size: 1.2rem;
      z-index: 1;
    }

    .menu {
      z-index: 1;
    }

    .menu a {
      display: block;
      border: 2px solid #00aaff;
      margin: 10px auto;
      padding: 10px 20px;
      width: 200px;
      text-decoration: none;
      color: #00aaff;
      transition: all 0.3s ease;
      text-align: center;
    }

    .menu a:hover {
      background: #00aaff;
      color: #000000;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="snow"></canvas>
  <h1>Fábio Dortas</h1>
  <p>&gt; Select a link</p>
  <div class="menu">
    <a href="https://github.com/Fabio-Dortas" target="_blank">GITHUB</a>
    <a href="https://www.instagram.com/fabio.dortas" target="_blank">INSTAGRAM</a>
    <a href="https://www.linkedin.com/in/f%C3%A1bio-dortas-3523213aa/" target="_blank">LINKEDIN</a>
  </div>

  <script>
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let flakes = [];

    function createFlakes() {
      for (let i = 0; i < 150; i++) {
        flakes.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 3 + 1,
          density: Math.random() * 2
        });
      }
    }

    function drawFlakes() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
      ctx.beginPath();
      for (let f of flakes) {
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2, true);
      }
      ctx.fill();
      moveFlakes();
    }

    function moveFlakes() {
      for (let f of flakes) {
        f.y += Math.pow(f.density, 2) + 1;
        if (f.y > canvas.height) {
          f.y = 0;
          f.x = Math.random() * canvas.width;
        }
      }
    }

    createFlakes();
    setInterval(drawFlakes, 25);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      flakes = [];
      createFlakes();
    });
  </script>
</body>
</html>
